name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
        chmod 600 ~/.ssh/key.pem

    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd cloudnexus-devsecops || git clone https://github.com/Sudheerkadiyala2/cloudnexus-devsecops.git
          cd cloudnexus-devsecops
          git pull
          docker stop cloudnexus-app || true
          docker rm cloudnexus-app || true
          docker build -t cloudnexus-app -f docker/Dockerfile .
          docker run -d -p 5000:5000 --name cloudnexus-app cloudnexus-app
        EOF
